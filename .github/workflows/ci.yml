name: CI

on:
  push:
    # allow CI to run on any branch so feature branches trigger checks
    branches: [ '**' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Production build
        run: npm run build
      - name: HTTP smoke tests for Next server
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 &
          for i in 1 2 3 4 5; do
            sleep 1
            curl -f http://127.0.0.1:3000/ && break || continue
          done
          node ./scripts/probe-http.js
        env:
          BASE_URL: 'http://127.0.0.1:3000'
      - name: Accessibility checks (pa11y)
        run: |
          npx pa11y --version || true
          node ./scripts/a11y-check.js
        env:
          BASE_URL: 'http://127.0.0.1:3000'
